entity: economic_indicator
display_name: Economic Indicator
description: Economic context data (unemployment, poverty, income)
canonical_table: fact_unemployment
primary_key: state_code
key_type: VARCHAR(2)
properties:
- name: observation_date
  type: DATE
- name: year
  type: BIGINT
- name: month
  type: BIGINT
- name: unemployment_rate
  type: DOUBLE
- name: source
  type: VARCHAR
- name: snapshot_date
  type: DATE
- name: snapshot
  type: DATE
relationships:
- name: in_state
  target_entity: state
  via_table: fact_unemployment
  join_key: state_code
  cardinality: many_to_one
  description: The state this economic indicator belongs to
fact_tables:
- fact_cpi
- fact_unemployment
- fact_median_income
- fact_state_gdp
- fact_state_population
- fact_acs_state
- fact_bea_personal_income
- fact_bea_income_components
- fact_bea_transfer_receipts
- fact_census_state_finances
- fact_tax_burden
- fact_state_tax_collections
- fact_saipe_poverty
- fact_sahie_state
- fact_county_health_rankings
- fact_food_environment
- fact_snap_enrollment
- fact_tanf_enrollment
- fact_fair_market_rent
