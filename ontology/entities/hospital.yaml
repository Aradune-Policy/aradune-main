entity: hospital
display_name: Hospital
description: A hospital identified by CMS Certification Number
canonical_table: fact_hospital_cost
primary_key: provider_ccn
key_type: VARCHAR
properties:
- name: hospital_name
  type: VARCHAR
- name: street_address
  type: VARCHAR
- name: city
  type: VARCHAR
- name: state_code
  type: VARCHAR
- name: zip_code
  type: VARCHAR
- name: county
  type: VARCHAR
- name: cbsa_code
  type: VARCHAR
- name: rural_urban
  type: VARCHAR
- name: facility_type
  type: VARCHAR
- name: provider_type_code
  type: BIGINT
- name: control_type_code
  type: BIGINT
- name: fy_begin_date
  type: DATE
- name: fy_end_date
  type: DATE
- name: bed_count
  type: INTEGER
- name: bed_days_available
  type: BIGINT
- name: fte_employees
  type: DOUBLE
- name: fte_residents
  type: DOUBLE
- name: medicare_days
  type: BIGINT
- name: medicaid_days
  type: BIGINT
- name: total_days
  type: BIGINT
relationships:
- name: in_state
  target_entity: state
  via_table: fact_hospital_cost
  join_key: state_code
  cardinality: many_to_one
  description: The state where this hospital is located
- name: has_quality
  target_entity: quality_measure
  via_table: fact_hospital_rating
  join_key: provider_ccn
  cardinality: one_to_many
  description: Quality measures reported for this hospital
- name: has_nursing_facilities
  target_entity: nursing_facility
  via_table: fact_nh_provider_info
  join_key: state_code
  cardinality: one_to_many
  description: Co-located nursing facilities in the same state
