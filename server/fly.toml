app = "aradune-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  [build.args]

[env]
  ARADUNE_LAKE_DIR = "/app/data/lake"
  ARADUNE_S3_BUCKET = "aradune-datalake"
  ARADUNE_S3_PREFIX = "lake/"
  ARADUNE_CORS_ORIGINS = '["https://aradune.co","https://www.aradune.co","http://localhost:5173"]'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 2048
