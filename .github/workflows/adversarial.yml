name: Adversarial Tests

on:
  schedule:
    - cron: "0 2 * * 0" # Sunday at 2 AM UTC
  workflow_dispatch:

jobs:
  adversarial:
    name: Adversarial Test Suite (Quick)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ARADUNE_TEST_URL: ${{ secrets.ARADUNE_API_BASE != '' && secrets.ARADUNE_API_BASE || 'https://aradune-api.fly.dev' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r server/requirements.txt requests

      - name: Run adversarial tests (quick mode)
        run: |
          python -m scripts.adversarial.runner \
            --quick \
            --json reports/adversarial_quick.json \
            --export reports/adversarial_quick.md

      - name: Import lessons to Skillbook
        if: always()
        run: |
          if [ -f reports/adversarial_quick.json ]; then
            python -m scripts.adversarial.skillbook_import \
              --report reports/adversarial_quick.json
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adversarial-results-${{ github.run_number }}
          path: reports/adversarial_quick.*
          retention-days: 90

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Adversarial Test Failure\n\n';
            body += `**Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n`;
            body += `**Triggered:** ${context.eventName}\n\n`;

            const mdPath = 'reports/adversarial_quick.md';
            if (fs.existsSync(mdPath)) {
              const report = fs.readFileSync(mdPath, 'utf8');
              // Trim to fit issue body limits
              const trimmed = report.length > 60000 ? report.slice(0, 60000) + '\n\n...(truncated)' : report;
              body += '### Report\n\n' + trimmed;
            } else {
              body += 'No report file generated. Check the workflow logs.\n';
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Adversarial test failure — run #${context.runNumber}`,
              body: body,
              labels: ['adversarial', 'automated']
            });
