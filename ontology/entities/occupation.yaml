entity: occupation
display_name: Healthcare Occupation
description: A BLS Standard Occupational Classification for healthcare workers
canonical_table: dim_bls_occupation
primary_key: soc_code
key_type: VARCHAR
properties:
- name: occupation_title
  type: VARCHAR
- name: medicaid_category
  type: VARCHAR
- name: data_year
  type: INTEGER
relationships:
- name: in_state
  target_entity: state
  via_table: fact_bls_wage
  join_key: state_code
  cardinality: many_to_one
  description: The state where this occupation wage data is reported
fact_tables:
- dim_bls_occupation
- fact_bls_medicaid_occupations
- fact_bls_oews
- fact_bls_wage
- fact_bls_wage_msa
- fact_bls_wage_national
