entity: enrollment_record
display_name: Enrollment Record
description: Monthly Medicaid enrollment by state
canonical_table: fact_enrollment
primary_key: state_code
key_type: VARCHAR(2)
properties:
- name: year
  type: BIGINT
- name: month
  type: BIGINT
- name: total_enrollment
  type: BIGINT
- name: chip_enrollment
  type: BIGINT
- name: ffs_enrollment
  type: BIGINT
- name: mc_enrollment
  type: BIGINT
- name: source
  type: VARCHAR
- name: snapshot_date
  type: DATE
- name: snapshot
  type: DATE
relationships:
- name: in_state
  target_entity: state
  via_table: fact_enrollment
  join_key: state_code
  cardinality: many_to_one
  description: The state this enrollment record belongs to
fact_tables:
- fact_enrollment
- fact_eligibility
- fact_new_adult
- fact_unwinding
- fact_mc_enrollment
- fact_mc_enrollment_summary
- fact_chip_enrollment
- fact_elig_group_monthly
- fact_elig_group_annual
- fact_eligibility_levels
- fact_mc_enroll_pop
- fact_mc_enroll_duals
- fact_enrollment_feb2026
- fact_eligibility_enrollment_snapshot
- fact_chip_enrollment_monthly
- fact_renewal_outcomes
