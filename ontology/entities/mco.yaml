entity: mco
display_name: Managed Care Organization
description: A Medicaid managed care plan
canonical_table: fact_mc_enrollment_plan
primary_key: plan_id
key_type: VARCHAR
properties:
- name: state_name
  type: VARCHAR
- name: program_name
  type: VARCHAR
- name: plan_name
  type: VARCHAR
- name: geographic_region
  type: VARCHAR
- name: medicaid_only_enrollment
  type: INTEGER
- name: dual_enrollment
  type: INTEGER
- name: total_enrollment
  type: INTEGER
- name: year
  type: INTEGER
- name: parent_organization
  type: VARCHAR
- name: is_pace
  type: BOOLEAN
- name: source
  type: VARCHAR
- name: snapshot_date
  type: DATE
- name: snapshot
  type: DATE
relationships:
- name: in_state
  target_entity: state
  via_table: fact_mc_enrollment_plan
  join_key: state_code
  cardinality: many_to_one
  description: The state where this MCO operates
- name: has_enrollment
  target_entity: enrollment_record
  via_table: fact_mc_enrollment_summary
  join_key: state_code
  cardinality: one_to_many
  description: Enrollment records for this managed care plan
fact_tables:
- fact_mc_enrollment
- fact_mc_enrollment_summary
- fact_managed_care
- fact_mco_mlr
- fact_mc_enrollment_by_plan
- fact_mc_enrollment_by_plan_2024
- fact_mc_share_enrollees_2024
- fact_mltss_enrollment_2024
