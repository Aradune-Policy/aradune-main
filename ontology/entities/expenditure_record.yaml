entity: expenditure_record
display_name: Expenditure Record
description: CMS-64 expenditure by state and category
canonical_table: fact_expenditure
primary_key: state_code
key_type: VARCHAR(2)
properties:
- name: fiscal_year
  type: BIGINT
- name: quarter
  type: BIGINT
- name: category
  type: VARCHAR
- name: subcategory
  type: VARCHAR
- name: federal_share
  type: DOUBLE
- name: total_computable
  type: DOUBLE
- name: source
  type: VARCHAR
- name: snapshot_date
  type: DATE
- name: snapshot
  type: DATE
relationships:
- name: in_state
  target_entity: state
  via_table: fact_expenditure
  join_key: state_code
  cardinality: many_to_one
  description: The state this expenditure record belongs to
fact_tables:
- fact_expenditure
- fact_cms64_multiyear
- fact_cms64_historical
- fact_cms64_new_adult
- fact_ffcra_fmap
- fact_cms64_caa_fmap_expenditures
- fact_macpac_spending_per_enrollee
- fact_ltss_expenditure
- fact_ltss_rebalancing
- fact_nhe
