entity: rate_cell
display_name: Rate Cell
description: A Medicaid-to-Medicare rate comparison for a state and procedure
canonical_table: fact_rate_comparison
primary_key: state_code
key_type: VARCHAR(2)
properties:
- name: procedure_code
  type: VARCHAR
- name: medicaid_rate
  type: DOUBLE
- name: medicare_nonfac_rate
  type: DOUBLE
- name: medicare_fac_rate
  type: DOUBLE
- name: pct_of_medicare
  type: DOUBLE
- name: em_category
  type: VARCHAR
- name: modifier
  type: VARCHAR
- name: rate_effective_date
  type: VARCHAR
- name: rate_description
  type: VARCHAR
- name: snapshot
  type: DATE
relationships:
- name: in_state
  target_entity: state
  via_table: fact_rate_comparison
  join_key: state_code
  cardinality: many_to_one
  description: The state this rate cell belongs to
- name: for_procedure
  target_entity: procedure
  via_table: fact_rate_comparison
  join_key: procedure_code
  cardinality: many_to_one
  description: The procedure code this rate applies to
fact_tables:
- fact_medicaid_rate
- fact_medicare_rate
- fact_medicare_rate_state
- fact_rate_comparison
- fact_pfs_rvu
- fact_pfs_rvu_2026
- fact_clfs
- fact_ambulance
- fact_dmepos
- fact_claims
- fact_claims_monthly
- dim_procedure
- dim_hcpcs
