entity: hcbs_program
display_name: HCBS Program
description: A Home and Community-Based Services waiver program
canonical_table: fact_hcbs_waitlist
primary_key: state_code
key_type: VARCHAR(2)
properties:
- name: state_name
  type: VARCHAR
- name: screens_eligibility
  type: VARCHAR
- name: idd_waiting
  type: INTEGER
- name: autism_waiting
  type: INTEGER
- name: seniors_physical_waiting
  type: INTEGER
- name: medically_fragile_waiting
  type: INTEGER
- name: hiv_aids_waiting
  type: INTEGER
- name: mental_health_waiting
  type: INTEGER
- name: tbi_sci_waiting
  type: INTEGER
- name: other_waiting
  type: INTEGER
- name: total_waiting
  type: INTEGER
- name: survey_year
  type: INTEGER
- name: source
  type: VARCHAR
- name: snapshot_date
  type: DATE
- name: snapshot
  type: DATE
relationships:
- name: in_state
  target_entity: state
  via_table: fact_hcbs_waitlist
  join_key: state_code
  cardinality: many_to_one
  description: The state operating this HCBS program
fact_tables:
- fact_hcbs_waitlist
- fact_hcbs_waiver_enrollment
- fact_cms372_waiver
- fact_1915c_waiver_participants
- fact_mltss
- fact_ltss_expenditure
- fact_ltss_rebalancing
- fact_macpac_hcbs_payment_scan
- ref_1115_waivers
- fact_section_1115_waivers
- fact_kff_1115_waivers
