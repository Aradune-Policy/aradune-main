name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Build & Lint checks (run on every push/PR)
  frontend:
    name: Frontend Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Production build
        run: npm run build
      - name: npm audit (supply chain)
        run: npm audit --audit-level=high || true

  api:
    name: API Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r server/requirements.txt pytest hypothesis pandera pip-audit
      - name: pip-audit (supply chain)
        run: pip-audit --fix --dry-run || true
      - name: Import check
        run: python -c "from server.main import app; print('FastAPI app loads OK')"
      - name: Config check
        run: "python -c \"from server.config import settings; print(f'Lake dir: {settings.lake_dir}')\""
      - name: Ontology validation
        run: python scripts/validate_ontology.py
      - name: Unit & adversarial tests
        run: python -m pytest tests/unit/ tests/adversarial/ -v --tb=short

  contract-testing:
    name: API Contract Testing (Schemathesis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r server/requirements.txt schemathesis
      - name: Start FastAPI server
        run: uvicorn server.main:app --port 8000 &
      - name: Wait for server ready
        run: sleep 5 && curl --retry 5 --retry-delay 2 http://localhost:8000/healthz
      - name: Schemathesis contract tests (dry-run)
        run: schemathesis run --checks all --base-url http://localhost:8000 http://localhost:8000/openapi.json --hypothesis-max-examples=5 --dry-run || true

  # Deploy (only on push to main, after checks pass)
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: [frontend, api]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build for production
        run: npm run build
      - name: Deploy to Vercel
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-api:
    name: Deploy API (Fly.io)
    needs: [frontend, api]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: flyctl deploy --config server/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
