planned_tables:
- table: fact_svi_county
  description: CDC/ATSDR Social Vulnerability Index at county level — composite ranking on 16 social factors (poverty, housing, transportation, minority status) grouped into 4 themes. ~3,200 rows.
  strategy: Manual browser download from atsdr.cdc.gov (WAF blocks programmatic). Simple CSV ingest.
  priority: high
- table: fact_svi_tract
  description: CDC SVI at census tract level — same indicators at finer geography. ~74,000 tracts.
  strategy: Same manual download. Larger file but same schema.
  priority: medium
- table: fact_adi_block_group
  description: Area Deprivation Index at block group level — socioeconomic deprivation ranking (1-100 national, 1-10 state). ~220,000 rows.
  strategy: Manual registration + download from neighborhoodatlas.medicine.wisc.edu
  priority: medium
- table: fact_brfss_state_indicators
  description: BRFSS behavioral risk factors aggregated to state level — smoking, obesity, diabetes, mental health, exercise, healthcare access. Filter from 1GB raw JSON.
  strategy: DuckDB read_json on cdc_brfss_state.json, filter to Medicaid-relevant indicators
  priority: medium
